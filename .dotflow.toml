schema_version = 1
minimum_dotflow_version = "0.1.0"

[repository]
branch = "master"
origin = "git@github.com:uvu1/dotfiles.git"
mise_dir = "mise"

[profiles.wsl]
platform = "wsl"
add_environment = "unix"

[[profiles.wsl.environments]]
mise_environment = "unix"

[[profiles.wsl.after_sync]]
program = "home-manager"
args = ["switch", "--flake", "{repo}#uvu1@arch-wsl"]
cwd = "{repo}"

[[profiles.wsl.after_sync]]
program = "bash"
args = ["scripts/sync-ai-config.sh"]
cwd = "{repo}"

[profiles.macos]
platform = "macos"
arch = "aarch64"
add_environment = "unix"

[[profiles.macos.environments]]
mise_environment = "unix"

[[profiles.macos.environments]]
mise_environment = "darwin"
targets = ["~/.config/karabiner", "~/.config/wezterm"]

[[profiles.macos.after_sync]]
program = "sudo"
args = ["darwin-rebuild", "switch", "--flake", "{repo}#uvu1-mac"]
cwd = "{repo}"

[[profiles.macos.after_sync]]
program = "bash"
args = ["scripts/sync-ai-config.sh"]
cwd = "{repo}"

[profiles.windows]
platform = "windows"
add_environment = "windows"

[[profiles.windows.environments]]
mise_environment = "windows"
targets = ["~/.config/nvim", "~/.gitconfig", "~/.config/wezterm"]

[[profiles.windows.environments]]
mise_environment = "windows-powershell"
targets = ["~/.config/mise/config.toml", "~/.config/starship.toml", "~/Documents/PowerShell"]
