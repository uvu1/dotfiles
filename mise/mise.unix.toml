# macOS(darwin) と WSL(linux) 共通の unix toolset と dotfiles。
# wsl / macos profile が mise 環境 "unix" として読み込む。
# base の mise.toml から delta, fd, fzf, just, lazygit, neovim, rg, stylua,
# tree-sitter を継承する。ここには unix 用の追加ツールだけを記載する。
[tools]
bat = "latest"
eza = "latest"
ghq = "latest"
helm = "latest"
kubectl = "latest"
starship = "latest"
rust = "latest"
gh = "latest"
jq = "latest"
node = "24.15.0"
python = "3.14"
codex = "latest"
cloudflared = "latest"
zoxide = "latest"
prettier = "latest"
pipx = "latest"
yamllint = "latest"
ruff = "latest"
biome = "latest"
yq = "latest"
claude = "latest"

[dotfiles]
"~/.agents/skills" = { source = "dotfiles/ai/skills/codex", mode = "symlink-each" }
"~/.claude/CLAUDE.md" = { source = "dotfiles/ai/claude/CLAUDE.md", mode = "symlink" }
"~/.claude/settings.json" = { source = "dotfiles/ai/claude/settings.json", mode = "symlink" }
"~/.claude/skills" = { source = "dotfiles/ai/skills/claude", mode = "symlink-each" }
"~/.codex/AGENTS.md" = { source = "dotfiles/ai/codex/AGENTS.md", mode = "symlink" }
"~/.codex/rules" = { source = "dotfiles/ai/codex/rules", mode = "symlink-each" }
"~/.config/mise/config.toml" = { source = "dotfiles/mise/config.unix.toml", mode = "copy" }
"~/.config/sheldon" = { source = "dotfiles/.config/sheldon", mode = "symlink" }
"~/.config/starship.toml" = { source = "dotfiles/.config/starship.toml", mode = "symlink" }
"~/.config/zsh" = { source = "dotfiles/.config/zsh", mode = "symlink" }
"~/.zshrc" = { source = "dotfiles/.zshrc", mode = "symlink" }
