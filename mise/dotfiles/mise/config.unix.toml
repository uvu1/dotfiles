# macOS(darwin) と WSL(linux) 共通で ~/.config/mise/config.toml へ配布する
# グローバル設定。standalone なので base をマージせず全ツールを列挙する。
[settings]
experimental = true
# .ruby-version / .node-version(.nvmrc) をプロジェクトのバージョン指定として読む
idiomatic_version_file_enable_tools = ["ruby", "node"]

[tools]
"github:uvu1/dotflow" = "0.1.0"
bat = "latest"
eza = "latest"
fd = "latest"
fzf = "latest"
ghq = "latest"
helm = "latest"
kubectl = "latest"
neovim = "latest"
starship = "latest"
rg = "latest"
rust = "latest"
gh = "latest"
jq = "latest"
node = "24.15.0"
python = "3.14"
codex = "latest"
stylua = "latest"
lazygit = "latest"
tree-sitter = "latest"
cloudflared = "latest"
zoxide = "latest"
prettier = "latest"
pipx = "latest"
yamllint = "latest"
ruff = "latest"
biome = "latest"
just = "latest"
delta = "latest"
yq = "latest"
claude = "latest"
