# Git と WezTerm は winget 管理のため mise には含めない。
[settings]
experimental = true

[tool_alias]
eza = "github:eza-community/eza"

[tools]
"github:uvu1/dotflow" = "0.1.0"
bat = "latest"
delta = "latest"
eza = { version = "latest", asset_pattern = "eza.exe_x86_64-pc-windows-gnu.zip" }
fd = "latest"
fzf = "latest"
gh = "latest"
ghq = "latest"
just = "latest"
kubectl = "latest"
lazygit = "latest"
neovim = "latest"
rg = "latest"
starship = "latest"
stylua = "latest"
tree-sitter = "latest"
