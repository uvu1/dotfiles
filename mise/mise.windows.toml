# Git と WezTerm は winget で導入する（mise では管理しない）。
# base の mise.toml から neovim ほか core CLI を継承。ここは Windows 用 dotfiles のみ。
[dotfiles]
"~/.config/nvim" = { source = "dotfiles/.config/nvim", mode = "copy" }
"~/.config/mise/config.toml" = { source = "dotfiles/mise/config.windows.toml", mode = "copy" }
"~/.config/wezterm" = { source = "dotfiles/.config/wezterm", mode = "copy" }
